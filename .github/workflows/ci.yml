name: CI

on:
  pull_request:
  push:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x ./gradlew

      - name: Run checks and tests
        run: ./gradlew --no-daemon check test

      - name: Build release AAR (catch release-build breakage on PR)
        run: ./gradlew --no-daemon :syni-sdk:assembleRelease
