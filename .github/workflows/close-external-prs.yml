name: Close external PRs

on:
  pull_request_target:
    types: [opened, reopened]

permissions:
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  close:
    runs-on: ubuntu-latest
    steps:
      - name: Close PR if author is not on the team
        uses: actions/github-script@v7
        env:
          ORG_READ_TOKEN: ${{ secrets.ORG_READ_TOKEN }}
        with:
          script: |
            const pr = context.payload.pull_request;
            const login = pr.user.login;
            const association = pr.author_association;

            // Allow-list trusted bots (Dependabot updates dep versions).
            if (login === "dependabot[bot]" || login === "dependabot-preview[bot]") {
              core.info(`Skipping: trusted bot @${login}`);
              return;
            }

            // Trust the webhook payload when it already reports a member-like
            // association. Note: for users with PRIVATE org membership, this
            // field can arrive as NONE/CONTRIBUTOR even though the org API
            // resolves it to MEMBER — hence the runtime fallback below.
            if (["OWNER", "MEMBER", "COLLABORATOR"].includes(association)) {
              core.info(`Skipping: author_association=${association} for @${login}`);
              return;
            }

            // Runtime check against the org membership API. The default
            // GITHUB_TOKEN cannot see private memberships, so this needs a
            // PAT (classic, scope: read:org) stored as ORG_READ_TOKEN.
            const orgReadToken = process.env.ORG_READ_TOKEN;
            if (orgReadToken) {
              // github-script@v7 bundles its dependencies, so
              // require("@actions/github") is not resolvable from the user
              // script — call the membership REST API directly with fetch
              // (a global in the Actions Node runtime).
              const resp = await fetch(
                `https://api.github.com/orgs/${context.repo.owner}/members/${login}`,
                {
                  headers: {
                    authorization: `Bearer ${orgReadToken}`,
                    accept: "application/vnd.github+json",
                    "user-agent": "close-external-prs",
                  },
                },
              );
              if (resp.status === 204) {
                core.info(`Skipping: @${login} is an org member of ${context.repo.owner} (verified via ORG_READ_TOKEN)`);
                return;
              } else if (resp.status === 404) {
                core.info(`@${login} is not a member of ${context.repo.owner}`);
              } else if (resp.status === 302) {
                core.warning(`ORG_READ_TOKEN cannot view membership for @${login} (302). Treating as external.`);
              } else {
                core.warning(`Membership check for @${login} errored: HTTP ${resp.status}. Treating as external.`);
              }
            } else {
              core.warning("ORG_READ_TOKEN secret is not set; private org members will be misclassified as external. Add a PAT with read:org scope.");
            }

            core.info(`Closing PR #${pr.number} from external author @${login} (association=${association})`);

            const body = [
              "Hi @" + context.payload.pull_request.user.login + ", thanks for your interest in Synheart.",
              "",
              "This repository is **source-available** and we do **not accept external pull requests** at this time.",
              "Synheart SDKs are developed in an internal monorepo and mirrored here for transparency.",
              "",
              "If you found a bug or want to request a feature, please [open an issue](../../issues/new/choose) — that is the supported way to influence the SDK.",
              "For the rationale, see [CONTRIBUTING.md](../blob/HEAD/CONTRIBUTING.md). For security reports, see [SECURITY.md](../blob/HEAD/SECURITY.md).",
              "",
              "We are closing this PR automatically. Thanks again for taking the time to look at the code.",
            ].join("\n");

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body,
            });

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              state: "closed",
            });
